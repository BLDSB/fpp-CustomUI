# Apache2 reverse proxy: /CustomUI → Flask app on port 5000
#
# Install:
#   sudo cp deploy/99-fpp-ui.conf /etc/apache2/conf-enabled/
#   sudo a2enmod proxy proxy_http headers
#   sudo service apache2 restart

<IfModule mod_proxy.c>
    ProxyRequests Off

    # Redirect /CustomUI (no trailing slash) so links resolve correctly.
    RedirectMatch permanent ^/CustomUI$ /CustomUI/

    <Location "/CustomUI/">
        # Tell Flask the original prefix so url_for() generates correct links.
        RequestHeader set X-Forwarded-Prefix "/CustomUI"

        ProxyPass "http://127.0.0.1:5000/"
        ProxyPassReverse "http://127.0.0.1:5000/"

        # Allow access from all network devices (Flask enforces its own login).
        Require all granted
    </Location>
</IfModule>
